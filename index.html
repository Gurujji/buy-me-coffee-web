<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buy Me a Coffee ☕</title>
    <style>
        :root {
            --bg-color: #0a192f;
            --card-bg: #112240;
            --text-main: #ccd6f6;
            --accent: #64ffda;
            --text-dim: #8892b0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            padding: 2.5rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
            max-width: 500px;
            width: 100%;
            border: 1px solid rgba(100, 255, 218, 0.1);
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            color: var(--accent);
        }

        p.subtitle {
            color: var(--text-dim);
            margin-bottom: 2rem;
        }

        .wallet-section {
            margin-bottom: 2rem;
            padding: 1.5rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
        }

        .wallet-label {
            font-weight: bold;
            color: var(--accent);
            display: block;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .qr-code {
            width: 180px;
            height: 180px;
            background-color: white;
            margin: 0 auto 15px;
            padding: 10px;
            border-radius: 8px;
        }

        .address-box {
            background: #020c1b;
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 0.85rem;
            word-break: break-all;
            border: 1px solid #233554;
            color: var(--text-dim);
            margin-bottom: 10px;
        }

        .copy-btn {
            background-color: transparent;
            color: var(--accent);
            border: 1px solid var(--accent);
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.3s;
        }

        .copy-btn:hover {
            background-color: rgba(100, 255, 218, 0.1);
        }

        footer {
            margin-top: 20px;
            font-size: 0.8rem;
            color: var(--text-dim);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Buy Me a Coffee ☕</h1>
    <p class="subtitle">If you found my work helpful, feel free to support me!</p>

    <div class="wallet-section">
        <span class="wallet-label">BITCOIN (BTC)</span>
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=bc1pfvdg7sxaga5qsazsdznaugd6pcc826edn7559jm7snufee6ku0cqvf4y7l" alt="BTC QR" class="qr-code">
        <div class="address-box" id="btc-addr">bc1pfvdg7sxaga5qsazsdznaugd6pcc826edn7559jm7snufee6ku0cqvf4y7l</div>
        <button class="copy-btn" onclick="copyText('btc-addr', this)">Copy BTC Address</button>
    </div>

    <div class="wallet-section">
        <span class="wallet-label">ETHEREUM (ETH)</span>
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=0x70e89FFBDCCAB1f31d0D11a2f206f1E2440D48d6" alt="ETH QR" class="qr-code">
        <div class="address-box" id="eth-addr">0x70e89FFBDCCAB1f31d0D11a2f206f1E2440D48d6</div>
        <button class="copy-btn" onclick="copyText('eth-addr', this)">Copy ETH Address</button>
    </div>

    <footer>
        Thank you for your generosity!
    </footer>
</div>

<script>
    function copyText(id, btn) {
        const text = document.getElementById(id).innerText;
        navigator.clipboard.writeText(text).then(() => {
            const originalText = btn.innerText;
            btn.innerText = "Copied! ✅";
            btn.style.borderColor = "#ffffff";
            btn.style.color = "#ffffff";
            
            setTimeout(() => {
                btn.innerText = originalText;
                btn.style.borderColor = "#64ffda";
                btn.style.color = "#64ffda";
            }, 2000);
        });
    }
</script>

</body>
</html>
